worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # 从 X-Forwarded-Host 提取端口号
    map $http_x_forwarded_host $upstream_port {
        ~^(?<port>\d+)-.*hermesstudio  $port;
        default                         8648;
    }

    # WebSocket upgrade 映射
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # DNS 解析器（Docker 内部 DNS）
    resolver 127.0.0.11 valid=30s;

    server {
        listen 80;

        # 允许上传大文件（无限制）
        client_max_body_size 0;

        # /preview/ → hermes-webui:8651
        location /preview/ {
            proxy_pass http://hermes-webui:8651/;
            proxy_set_header Host $http_x_forwarded_host;
            proxy_set_header X-Forwarded-Host $http_x_forwarded_host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        }

        # /xai-oauth/ → hermes-webui:56121
        location /xai-oauth/ {
            proxy_pass http://hermes-webui:56121/;
            proxy_set_header Host $http_x_forwarded_host;
            proxy_set_header X-Forwarded-Host $http_x_forwarded_host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        }

        # 默认 → hermes-webui:$upstream_port
        location / {
            proxy_pass http://hermes-webui:$upstream_port;
            proxy_set_header Host $http_x_forwarded_host;
            proxy_set_header X-Forwarded-Host $http_x_forwarded_host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;

            # WebSocket 支持
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            # 启动重试：连接失败时自动重试，最多 30 秒
            proxy_connect_timeout 5s;
            proxy_next_upstream error timeout;
            proxy_next_upstream_tries 6;
            proxy_next_upstream_timeout 30s;

            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }
    }
}
