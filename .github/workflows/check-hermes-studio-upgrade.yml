name: Check Hermes Studio upgrade

"on":
  workflow_dispatch: {}
  schedule:
    # 北京时间每天 10:00 检查一次；发现新版本时只创建升级 PR，不自动合并。
    - cron: '0 2 * * *'

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  check:
    name: Check upstream and prepare upgrade PR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Check upstream release and update LPK metadata
        id: check
        env:
          ACR_REGISTRY: ${{ secrets.ACR_REGISTRY || 'registry.cn-shanghai.aliyuncs.com' }}
          ACR_NAMESPACE: ${{ secrets.ACR_NAMESPACE || 'wtjking' }}
          ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
          ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
          UPSTREAM_REPO: EKKOLearnAI/hermes-studio
          UPSTREAM_IMAGE: ekkoye8888/hermes-web-ui
          APP_IMAGE_NAME: hermes-web-ui
          MANIFEST_PATH: lzc-manifest.yml
          CHANGELOG_PATH: CHANGELOG.md
          PACKAGE_PATH: package.yml
        run: python3 -u .github/scripts/check-hermes-studio-version.py

      - name: Create or update upgrade PR
        id: create-pr
        if: steps.check.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CURRENT_VERSION: ${{ steps.check.outputs.current_version }}
          ACR_IMAGE: ${{ steps.check.outputs.acr_image }}
          PACKAGE_VERSION: ${{ steps.check.outputs.package_version }}
          UPSTREAM_VERSION: ${{ steps.check.outputs.upstream_version }}
        run: |
          set -euo pipefail

          BRANCH="automation/hermes-webui-${UPSTREAM_VERSION}"
          TITLE="feat: upgrade hermes-webui image to ${UPSTREAM_VERSION}"
          BODY_FILE="$(mktemp)"

          cat > "$BODY_FILE" <<EOF
          自动检查发现 Hermes Web UI 有新版本。

          - 上游版本：`${UPSTREAM_VERSION}`
          - 当前版本：`${CURRENT_VERSION}`
          - 目标 ACR 镜像：`${ACR_IMAGE}`
          - LPK package 版本：`${PACKAGE_VERSION}`

          本 PR 只准备升级变更，不自动合并、不自动发布。需要人工确认 LPK 测试通过后再合并 main。
          EOF

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout -B "$BRANCH"
          git add package.yml lzc-manifest.yml CHANGELOG.md

          if git diff --cached --quiet; then
            echo "No metadata changes staged; continuing to PR sync."
          else
            git commit -m "$TITLE"
            git push --force-with-lease origin "$BRANCH"
          fi

          BRANCH="$BRANCH" TITLE="$TITLE" BODY_FILE="$BODY_FILE" python3 - <<'PY2'
          import json
          import os
          import urllib.parse
          import urllib.request

          repo = os.environ['GITHUB_REPOSITORY']
          owner = repo.split('/', 1)[0]
          branch = os.environ['BRANCH']
          title = os.environ['TITLE']
          body = open(os.environ['BODY_FILE'], encoding='utf-8').read()
          token = os.environ['GITHUB_TOKEN']
          api = f'https://api.github.com/repos/{repo}'
          headers = {
              'Authorization': f'token {token}',
              'Accept': 'application/vnd.github+json',
              'User-Agent': 'Hermes-Agent-Workflow',
          }

          def req(method, url, payload=None):
              data = None if payload is None else json.dumps(payload).encode()
              request = urllib.request.Request(
                  url,
                  data=data,
                  headers={**headers, 'Content-Type': 'application/json'},
                  method=method,
              )
              with urllib.request.urlopen(request) as response:
                  return json.load(response)

          query = urllib.parse.urlencode({'state': 'open', 'head': f'{owner}:{branch}', 'base': 'main'})
          pulls = req('GET', f'{api}/pulls?{query}')
          if pulls:
              pr = req('PATCH', f"{api}/pulls/{pulls[0]['number']}", {'title': title, 'body': body})
          else:
              pr = req('POST', f'{api}/pulls', {'title': title, 'body': body, 'head': branch, 'base': 'main'})
          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as fh:
              fh.write(f"pull-request-number={pr['number']}\n")
          print(f"Prepared PR #{pr['number']}: {pr['html_url']}")
          PY2

      - name: Comment on upgrade PR
        if: steps.check.outputs.changed == 'true' && steps.create-pr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ steps.create-pr.outputs.pull-request-number }}
          UPSTREAM_VERSION: ${{ steps.check.outputs.upstream_version }}
          ACR_IMAGE: ${{ steps.check.outputs.acr_image }}
        run: |
          gh pr comment "$PR" -F - <<EOF
          已创建升级 PR: upstream ${UPSTREAM_VERSION} -> ACR ${ACR_IMAGE}
          请下载 LPK 测试后合并 main。
          EOF
