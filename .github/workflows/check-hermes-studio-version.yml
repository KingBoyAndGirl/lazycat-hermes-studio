name: Check Hermes Studio upgrade

on:
  schedule:
    # 北京时间每天 10:00 检查一次；发现新版本时只创建 PR，不自动合并。
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  check:
    name: Check upstream and prepare upgrade PR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Check upstream release and update LPK metadata
        id: check
        env:
          ACR_REGISTRY: ${{ secrets.ACR_REGISTRY || 'registry.cn-shanghai.aliyuncs.com' }}
          ACR_NAMESPACE: ${{ secrets.ACR_NAMESPACE || 'wtjking' }}
          ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
          ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
          UPSTREAM_REPO: EKKOLearnAI/hermes-studio
          UPSTREAM_IMAGE: ekkoye8888/hermes-web-ui
          APP_IMAGE_NAME: hermes-web-ui
          MANIFEST_PATH: lzc-manifest.yml
          CHANGELOG_PATH: CHANGELOG.md
          PACKAGE_PATH: package.yml
        run: python3 .github/scripts/check-hermes-studio-version.py

      - name: Create upgrade PR
        if: steps.check.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: ${{ format('feat: upgrade hermes-webui image to {0}', steps.check.outputs.upstream_version) }}
          branch: ${{ format('automation/hermes-webui-{0}', steps.check.outputs.upstream_version) }}
          delete-branch: false
          title: ${{ format('feat: upgrade hermes-webui image to {0}', steps.check.outputs.upstream_version) }}
          body: |
            自动检查发现 Hermes Web UI 有新版本。

            - 上游版本：`${{ steps.check.outputs.upstream_version }}`
            - 当前版本：`${{ steps.check.outputs.current_version }}`
            - 目标 ACR 镜像：`${{ steps.check.outputs.acr_image }}`
            - LPK package 版本：`${{ steps.check.outputs.package_version }}`

            本 PR 只准备升级变更，不自动合并、不自动发布。需要人工确认 LPK 测试通过后再合并 main。
          labels: |
            automation
            hermes-studio
          reviewers: |
            KingBoyAndGirl
