name: Test workflow dispatch

"on":
  workflow_dispatch: {}

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  check:
    name: Check upstream and prepare upgrade PR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Check upstream release and update LPK metadata
        id: check
        env:
          ACR_REGISTRY: registry.cn-shanghai.aliyuncs.com
          ACR_NAMESPACE: wtjking
          ACR_USERNAME: dummy-user
          ACR_PASSWORD: dummy-pass
          UPSTREAM_REPO: EKKOLearnAI/hermes-studio
          UPSTREAM_IMAGE: ekkoye8888/hermes-web-ui
          APP_IMAGE_NAME: hermes-web-ui
          MANIFEST_PATH: lzc-manifest.yml
          CHANGELOG_PATH: CHANGELOG.md
          PACKAGE_PATH: package.yml
        run: |
          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "upstream_version=v0.6.19" >> "$GITHUB_OUTPUT"
          echo "current_version=v0.6.18" >> "$GITHUB_OUTPUT"
          echo "acr_image=registry.cn-shanghai.aliyuncs.com/wtjking/hermes-web-ui:v0.6.19" >> "$GITHUB_OUTPUT"
          echo "package_version=2026.06.23" >> "$GITHUB_OUTPUT"

      - name: Create upgrade PR
        id: create-pr
        if: steps.check.outputs.changed == 'true'
        run: |
          echo "pull-request-number=123" >> "$GITHUB_OUTPUT"
          echo "would create PR for ${{ steps.check.outputs.upstream_version }}"
