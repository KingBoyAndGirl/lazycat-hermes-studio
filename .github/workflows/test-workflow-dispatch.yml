name: Test workflow dispatch

"on":
  workflow_dispatch: {}

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  check:
    name: Check upstream and prepare upgrade PR
    runs-on: ubuntu-latest
    steps:
      - name: Print dispatch context
        run: |
          echo "stage1 dispatch is working"
          echo "ref=${GITHUB_REF}"
          echo "sha=${GITHUB_SHA}"
