name: Test workflow dispatch

"on":
  workflow_dispatch: {}

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  check:
    name: Check upstream and prepare upgrade PR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Check upstream release and update LPK metadata
        id: check
        env:
          ACR_REGISTRY: registry.cn-shanghai.aliyuncs.com
          ACR_NAMESPACE: wtjking
          ACR_USERNAME: dummy-user
          ACR_PASSWORD: dummy-pass
          UPSTREAM_REPO: EKKOLearnAI/hermes-studio
          UPSTREAM_IMAGE: ekkoye8888/hermes-web-ui
          APP_IMAGE_NAME: hermes-web-ui
          MANIFEST_PATH: lzc-manifest.yml
          CHANGELOG_PATH: CHANGELOG.md
          PACKAGE_PATH: package.yml
        run: |
          echo "stage3 script step schema is accepted"
          echo "ACR_REGISTRY=${ACR_REGISTRY}"
          echo "UPSTREAM_REPO=${UPSTREAM_REPO}"
          echo "PACKAGE_PATH=${PACKAGE_PATH}"
