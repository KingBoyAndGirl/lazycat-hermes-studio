# lzc-manifest.yml — LazyCat LPK v2 manifest
# Hermes Studio with Nowledge Mem, whole-home persistence.

manifestVersion: 2

services:
  hermes-studio:
    image: embed:hermes-studio
    run_as:
      uid: 1000
      gid: 1000

    binds:
      # Whole-home persistence — survives container restarts
      - /lzcapp/var/home:/home/agent

    environment:
      - HOME=/home/agent
      - HERMES_HOME=/home/agent/.hermes
      - HERMES_WEB_UI_HOME=/home/agent/.hermes-web-ui
      - PATH=/home/agent/.local/bin:/opt/hermes/.venv/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      # Let Hermes skip prompts in container
      - HERMES_YOLO_MODE=1

    ports:
      - 8648:8648

    setup_script: /opt/setup-once.sh
