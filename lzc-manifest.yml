application:
  subdomain: hermesstudio
  privileged: true
  multi_instance: true
  routes:
    - /=http://nginx:80
  public_path:
    - /
  health_check:
    test_url: http://hermes-webui:8648
    start_period: 600s
    timeout: 5s

services:
  nginx:
    image: registry.cn-shanghai.aliyuncs.com/wtjking/nginx:alpine
    setup_script: |
      sh /lzcapp/pkg/content/setup-nginx.sh

  hermes-webui:
    image: registry.cn-shanghai.aliyuncs.com/wtjking/hermes-web-ui:v0.6.19
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8648"]
      interval: 5s
      timeout: 3s
      start_period: 600s
    environment:
      - PORT=8648
      - HERMES_HOME=/home/agent/.hermes
      - HERMES_BIN=/opt/hermes/.venv/bin/hermes
      - HERMES_WEB_UI_MANAGED_GATEWAY=1
      - HERMES_WEB_UI_XAI_CALLBACK_BIND_HOST=0.0.0.0
      - PATH=/home/agent/.local/bin:/opt/hermes/.venv/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      - HERMES_ALLOW_ROOT_GATEWAY=1
    binds:
      - /lzcapp/documents/{{ .S.DeployUID }}:/home/agent
      - /lzcapp/var/cache:/lzcapp/cache

    setup_script: |
      #!/bin/sh
      # base/ = image content snapshot (replaced on image update)
      # upper/ = user changes only (always preserved across updates)
      # /home excluded - already persistent via /lzcapp/documents/<uid> bind

      ROOTFS=/lzcapp/cache/rootfs
      BASE=$ROOTFS/base
      UPPER=$ROOTFS/upper
      DIRS="etc opt root srv usr var"


      # --- Image fingerprint: overlay lowerdir (works for latest tag too) ---
      CURRENT_ID=$(grep " / rw.*overlay" /proc/1/mountinfo | md5sum | cut -d" " -f1)
      STORED_ID=$(cat "$ROOTFS/.image-id" 2>/dev/null)
      # --- First boot or image update: snapshot base ---
      NEED_SNAPSHOT=0
      if [ ! -f "$ROOTFS/.image-id" ]; then
        echo "[setup] first boot: creating base snapshot..."
        NEED_SNAPSHOT=1
      elif [ "$CURRENT_ID" != "$STORED_ID" ]; then
        echo "[setup] image update detected ($STORED_ID -> $CURRENT_ID)"
        echo "[setup] re-snapshotting base (user packages preserved in upper)..."
        NEED_SNAPSHOT=1
      fi

      if [ "$NEED_SNAPSHOT" = "1" ]; then
        mkdir -p "$BASE"
        for d in $DIRS; do
          if [ -d "/$d" ] && ! [ -L "/$d" ]; then
            rm -rf "$BASE/$d"
            cp -a "/$d" "$BASE/$d"
          fi
        done
        echo "$CURRENT_ID" > "$ROOTFS/.image-id"
        echo "[setup] base snapshot done"
      fi

      # --- Sync container-generated files (Docker writes each boot) ---
      for f in resolv.conf hostname hosts; do
        [ -f "/etc/$f" ] && cp -f "/etc/$f" "$BASE/etc/$f" 2>/dev/null
      done

      # --- Overlay mount: base(lower) + user-changes(upper) ---
      n=0
      for d in $DIRS; do
        [ -d "$BASE/$d" ] || continue
        [ -d "/$d" ] || continue
        mkdir -p "$UPPER/$d"
        rm -rf "$ROOTFS/work/$d"
        mkdir -p "$ROOTFS/work/$d"
        mount -t overlay overlay \
          -o "lowerdir=$BASE/$d,upperdir=$UPPER/$d,workdir=$ROOTFS/work/$d" \
          "/$d" && n=$((n+1))
      done
      echo "[setup] rootfs: $n dirs overlay (base lower + user upper)"


      # --- Migrate /lzcapp/var/home to /home/agent on first boot ---
      if [ ! -f /home/agent/.migrated-from-var-home ]; then
        if [ -d /lzcapp/var/home ] && [ "$(ls -A /lzcapp/var/home 2>/dev/null)" ]; then
          echo "[setup] migrating /lzcapp/var/home -> /home/agent ..."
          cp -a /lzcapp/var/home/. /home/agent/
          touch /home/agent/.migrated-from-var-home
          echo "[setup] migration done"
        else
          touch /home/agent/.migrated-from-var-home
        fi
      fi
      # --- Bash history: flush after each command (survives container kill) ---
      BASHRC=/home/agent/.bashrc
      if ! grep -q "history -a" "$BASHRC" 2>/dev/null; then
        printf '\n# History: write after each command (survives container kill)\nexport HISTFILE=~/.bash_history\nexport HISTSIZE=10000\nexport HISTFILESIZE=20000\nexport PROMPT_COMMAND="history -a; $PROMPT_COMMAND"\n' >> "$BASHRC"
        echo "[setup] bash history config added to .bashrc"
      fi


      # --- Ensure ~/.local/bin survives into login-shell PATH snapshots ---
      for PROFILE in /home/agent/.profile /home/agent/.bash_profile; do
        touch "$PROFILE"
        if ! grep -q '/home/agent/.local/bin' "$PROFILE" 2>/dev/null; then
          printf '\n# LazyCat: ensure user-local CLI tools are on PATH\nexport PATH="/home/agent/.local/bin:$PATH"\n' >> "$PROFILE"
          echo "[setup] PATH export added to $PROFILE"
        fi
      done


