package: hermes-studio

application:
  subdomain: hermes-studio
  privileged: true
  multi_instance: true
  upstreams:
    - location: /
      backend: http://hermes-webui:{{ .U.port }}/
    - location: /preview/
      backend: http://hermes-webui:{{ .U.preview_frontend_port }}/
      disable_auto_health_checking: true
    - location: /xai-oauth/
      backend: http://hermes-webui:{{ .U.xai_oauth_port }}/
      disable_auto_health_checking: true

  public_path:
    - /

services:
  hermes-webui:
    image: ekkoye8888/hermes-web-ui:latest
    setup_script: |
      # 兼容旧版 bind 路径迁移（每次启动检查，只迁移一次）
      if [ -d /lzcapp/migrate/hermes ] && [ ! -f /home/agent/.hermes/.migrated ]; then
        echo "[setup] Migrating .hermes from old path..."
        mkdir -p /home/agent/.hermes
        cp -a /lzcapp/migrate/hermes/. /home/agent/.hermes/
        touch /home/agent/.hermes/.migrated
        echo "[setup] .hermes migrated."
      fi
      if [ -d /lzcapp/migrate/hermes-web-ui ] && [ ! -f /home/agent/.hermes-web-ui/.migrated ]; then
        echo "[setup] Migrating .hermes-web-ui from old path..."
        mkdir -p /home/agent/.hermes-web-ui
        cp -a /lzcapp/migrate/hermes-web-ui/. /home/agent/.hermes-web-ui/
        touch /home/agent/.hermes-web-ui/.migrated
        echo "[setup] .hermes-web-ui migrated."
      fi
    environment:
      - PORT={{ .U.port }}
      - HERMES_HOME=/home/agent/.hermes
      - HERMES_BIN=/opt/hermes/.venv/bin/hermes
      - HERMES_WEB_UI_MANAGED_GATEWAY=1
      - HERMES_WEB_UI_XAI_CALLBACK_BIND_HOST=0.0.0.0
      - PATH=/home/agent/.local/bin:/opt/hermes/.venv/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      - HERMES_ALLOW_ROOT_GATEWAY=1
    binds:
      - /lzcapp/var/home:/home/agent
      - /lzcapp/var/hermes:/lzcapp/migrate/hermes
      - /lzcapp/var/hermes-web-ui:/lzcapp/migrate/hermes-web-ui
