application:
  subdomain: hermes-studio
  privileged: true
  multi_instance: true
  upstreams:
    - location: /
      backend: http://hermes-webui:8648/
    - location: /preview/
      backend: http://hermes-webui:8651/
      disable_auto_health_checking: true
    - location: /xai-oauth/
      backend: http://hermes-webui:56121/
      disable_auto_health_checking: true
  public_path:
    - /

services:
  hermes-webui:
    image: registry.cn-shanghai.aliyuncs.com/wtjking/hermes-studio:path-fix-0.0.3
    environment:
      - PORT=8648
      - HERMES_HOME=/home/agent/.hermes
      - HERMES_BIN=/opt/hermes/.venv/bin/hermes
      - HERMES_WEB_UI_MANAGED_GATEWAY=1
      - HERMES_WEB_UI_XAI_CALLBACK_BIND_HOST=0.0.0.0
      - PATH=/home/agent/.local/bin:/opt/hermes/.venv/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      - HERMES_ALLOW_ROOT_GATEWAY=1
    binds:
      - /lzcapp/var/home:/home/agent
      - /lzcapp/var/cache:/lzcapp/cache

    setup_script: |
      #!/bin/sh
      # Full rootfs persistence via overlay with pre-populated upper layer
      # v0.0.9 proved overlay mount works from setup_script
      # Pre-populated upper avoids dpkg-divert cross-layer rename issue
      # /home excluded - already persistent via /lzcapp/var/home bind

      ROOTFS=/lzcapp/cache/rootfs
      DIRS="etc opt root srv usr var"

      npm config set prefix /home/agent/.local 2>/dev/null || true

      # First boot: snapshot rootfs to btrfs persistent storage
      if [ ! -f "$ROOTFS/.initialized" ]; then
        echo "[setup] first boot: snapshotting rootfs to persistent storage..."
        mkdir -p "$ROOTFS"
        for d in $DIRS; do
          if [ -d "/$d" ] && ! [ -L "/$d" ]; then
            cp -a "/$d" "$ROOTFS/" && echo "[setup]   /$d done"
          fi
        done
        touch "$ROOTFS/.initialized"
        echo "[setup] snapshot complete"
      fi

      # Sync container-generated files each boot
      for f in resolv.conf hostname hosts; do
        [ -f "/etc/$f" ] && cp -f "/etc/$f" "$ROOTFS/etc/$f" 2>/dev/null
      done

      # Overlay mount with pre-populated upper layer
      n=0
      for d in $DIRS; do
        [ -d "$ROOTFS/$d" ] || continue
        [ -d "/$d" ] || continue
        rm -rf "$ROOTFS/${d}-work"
        mkdir -p "$ROOTFS/${d}-work"
        mount -t overlay overlay           -o "lowerdir=/$d,upperdir=$ROOTFS/$d,workdir=$ROOTFS/${d}-work"           "/$d" && n=$((n+1))
      done
      echo "[setup] rootfs persistence: $n directories overlay-mounted"

      export PATH="/home/agent/.local/bin:$PATH"
