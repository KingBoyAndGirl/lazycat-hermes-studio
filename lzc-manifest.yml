application:
  subdomain: hermes-studio
  privileged: true
  multi_instance: true
  upstreams:
    - location: /
      backend: http://hermes-webui:8648/
    - location: /preview/
      backend: http://hermes-webui:8651/
      disable_auto_health_checking: true
    - location: /xai-oauth/
      backend: http://hermes-webui:56121/
      disable_auto_health_checking: true
  public_path:
    - /

services:
  hermes-webui:
    image: registry.cn-shanghai.aliyuncs.com/wtjking/hermes-studio:path-fix-0.0.3
    environment:
      - PORT=8648
      - HERMES_HOME=/home/agent/.hermes
      - HERMES_BIN=/opt/hermes/.venv/bin/hermes
      - HERMES_WEB_UI_MANAGED_GATEWAY=1
      - HERMES_WEB_UI_XAI_CALLBACK_BIND_HOST=0.0.0.0
      - PATH=/home/agent/.local/bin:/opt/hermes/.venv/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      - HERMES_ALLOW_ROOT_GATEWAY=1
    binds:
      - /lzcapp/var/home:/home/agent
      - /lzcapp/var/cache:/lzcapp/cache

    setup_script: |
      #!/bin/sh
      set -e
      OVERLAY_ROOT=/lzcapp/cache/overlay

      # npm prefix persistence
      npm config set prefix /home/agent/.local 2>/dev/null || true

      # Overlay /usr — all user-installed binaries/libs persist
      mkdir -p $OVERLAY_ROOT/usr-upper $OVERLAY_ROOT/usr-work
      if mount | grep -q "overlay on /usr type"; then
        echo "[setup] /usr overlay already mounted"
      else
        mount -t overlay overlay \
          -o lowerdir=/usr,upperdir=$OVERLAY_ROOT/usr-upper,workdir=$OVERLAY_ROOT/usr-work \
          /usr
        echo "[setup] /usr overlay mounted"
      fi

      # Overlay /etc/alternatives — persistent alternatives symlinks
      mkdir -p $OVERLAY_ROOT/alternatives-upper $OVERLAY_ROOT/alternatives-work
      if mount | grep -q "overlay on /etc/alternatives type"; then
        echo "[setup] /etc/alternatives overlay already mounted"
      else
        mount -t overlay overlay \
          -o lowerdir=/etc/alternatives,upperdir=$OVERLAY_ROOT/alternatives-upper,workdir=$OVERLAY_ROOT/alternatives-work \
          /etc/alternatives
        echo "[setup] /etc/alternatives overlay mounted"
      fi

      export PATH="/home/agent/.local/bin:$PATH"
