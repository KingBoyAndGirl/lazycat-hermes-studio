# LazyCat 构建配置
buildscript: ":"
manifest: ./lzc-manifest.yml
contentdir: ./content
pkgout: ./lpk
icon: ./lzc-icon.png

actions:
  prebuild:
    - mkdir -p ./content ./lpk

compose_override:
  services:
    hermes-webui:
      cap_add:
        - SYS_ADMIN
      devices:
        - /dev/fuse:/dev/fuse
      volumes:
        - /data/playground/docker.sock:/var/run/docker.sock
