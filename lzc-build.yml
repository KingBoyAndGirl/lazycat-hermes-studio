# LazyCat 构建配置
buildscript: echo "Build skipped - using direct Docker image deployment"
manifest: ./lzc-manifest.yml
contentdir: ./content
pkgout: ./lpk
icon: ./lzc-icon.png
deploy_params: ./lzc-deploy-params.yml

actions:
  prebuild:
    - mkdir -p ./content ./lpk

compose_override:
  services:
    hermes-webui:
      volumes:
        - /data/playground/docker.sock:/var/run/docker.sock
